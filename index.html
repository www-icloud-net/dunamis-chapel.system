function loadImageElement(src='') {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('Failed to load image.'));
    img.src = src;
  });
}
async function buildZoomedImageFile(sourceDataUrl='', { zoom=1, offsetX=0, offsetY=0, outputWidth=1600, outputHeight=900, filename='edited-image.png' } = {}) {
  const img = await loadImageElement(sourceDataUrl);
  const canvas = document.createElement('canvas');
  canvas.width = outputWidth;
  canvas.height = outputHeight;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, outputWidth, outputHeight);
  const baseScale = Math.max(outputWidth / img.width, outputHeight / img.height);
  const finalScale = baseScale * Math.max(0.3, Number(zoom || 1));
  const drawWidth = img.width * finalScale;
  const drawHeight = img.height * finalScale;
  const drawX = ((outputWidth - drawWidth) / 2) + Number(offsetX || 0);
  const drawY = ((outputHeight - drawHeight) / 2) + Number(offsetY || 0);
  ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.95));
  if (!blob) throw new Error('Failed to prepare image.');
  return new File([blob], filename, { type: 'image/png' });
}

function normalizeData(raw={}) {
  const base = { churchSettings: defaultChurch };
  COLLECTION_KEYS.forEach(key => { base[key] = []; });
  const merged = { ...base, ...raw };
  merged.churchSettings = ensureDailyVerseSettings({ ...defaultChurch, ...(raw.churchSettings || raw.church_settings || {}) });
  COLLECTION_KEYS.forEach(key => { merged[key] = safeArray(raw[key]); });
  merged.presence = {};
  safeArray(merged.presenceRows).forEach(row => {
    const key = row.role;
    merged.presence[key] = { online: !!row.is_online, last_seen: row.last_seen };
  });
  return merged;
}
function cleanForTable(table, row) {
  const next = { ...row };
  if (table === 'church_pledges') delete next.balance;
  delete next.presence;
  safeArray(EMPTY_TO_NULL_FIELDS[table]).forEach(field => {
    if (next[field] === '') next[field] = NUMBER_FIELDS.has(field) ? 0 : null;
    if (NUMBER_FIELDS.has(field) && next[field] !== null && next[field] !== undefined) next[field] = Number(next[field] || 0);
  });
  return next;
}
async function fetchSupabaseData() {
  if (!supabaseClient) throw new Error('Supabase is not configured.');
  const { data: settings, error: settingsError } = await supabaseClient.from('church_settings').select('*').eq('id', 1).maybeSingle();
  if (settingsError) throw settingsError;
  const loaded = { churchSettings: settings || defaultChurch };
  if (!hasActiveSessionToken()) return normalizeData(loaded);
  for (const [key, table] of Object.entries(TABLES)) {
    const selectColumns = SAFE_SELECT_COLUMNS[key] || '*';
    const { data, error } = await supabaseClient.from(table).select(selectColumns);
    if (error) throw error;
    loaded[key] = data || [];
  }
  return normalizeData(loaded);
}
async function syncSimpleTable(table, prevItems=[], nextItems=[]) {
  if (!supabaseClient) return;
  if (table === TABLES.credentials) throw new Error('Credentials must be changed from the secure Accounts screen.');
  const prevIds = new Set(safeArray(prevItems).map(x => x.id).filter(Boolean));
  const nextIds = new Set(safeArray(nextItems).map(x => x.id).filter(Boolean));
  const deletedIds = [...prevIds].filter(id => !nextIds.has(id));
  if (deletedIds.length) {
    const { error } = await supabaseClient.from(table).delete().in('id', deletedIds);
    if (error) throw error;
  }
  const prevById = new Map(safeArray(prevItems).map(row => [row.id, cleanForTable(table, row)]));
  const rows = safeArray(nextItems)
    .map(row => cleanForTable(table, row))
    .filter(row => !row.id || JSON.stringify(prevById.get(row.id) || null) !== JSON.stringify(row));
  if (rows.length) {
    const { error } = await supabaseClient.from(table).upsert(rows, { onConflict: 'id' });
    if (error) throw error;
  }
}
async function syncSettings(settings) {
  if (!supabaseClient) return;
  if (!canSyncChurchSettings()) return false;
  const { error } = await supabaseClient.from('church_settings').upsert({ ...ensureDailyVerseSettings(settings), id: 1 }, { onConflict: 'id' });
  if (error) throw error;
  return true;
}
async function syncAll(data) {
  if (canSyncChurchSettings()) await syncSettings(data.churchSettings);
  for (const key of COLLECTION_KEYS) {
    if (key === 'credentials') continue;
    await syncSimpleTable(TABLES[key], [], data[key]);
  }
}

const DataContext = React.createContext(null);
const SessionContext = React.createContext(null);

function DataProvider({ children }) {
  const [data, setData] = React.useState(defaultData());
  const [loaded, setLoaded] = React.useState(false);
  const [busyText, setBusyText] = React.useState('');
  const [notifications, setNotifications] = React.useState([]);
  const [offlineState, setOfflineState] = React.useState({ mode: supabaseClient ? 'syncing' : 'offline', pendingCount: 0, lastSyncAt: '', lastError: '' });

  const notify = React.useCallback((type, message) => {
    const id = uid();
    setNotifications(list => [{ id, type, message }, ...list].slice(0, 5));
    setTimeout(() => setNotifications(list => list.filter(item => item.id !== id)), 5200);
  }, []);
  const dismissNotification = id => setNotifications(list => list.filter(item => item.id !== id));

  const reloadData = React.useCallback(async ({ silent=false } = {}) => {
    if (!silent) setBusyText('Loading church records...');
    try {
      const remote = await fetchSupabaseData();
      setData(remote);
      await persistOffline(remote);
      setOfflineState(state => ({ ...state, mode: 'online', lastSyncAt: nowIso(), lastError: '' }));
      return true;
    } catch (error) {
      const offline = await loadOffline();
      setData(offline);
      setOfflineState(state => ({ ...state, mode: 'offline', lastError: error?.message || 'Offline data loaded.' }));
      if (!silent) notify('info', 'Local church records loaded.');
      return false;
    } finally {
      setLoaded(true);
      setBusyText('');
    }
  }, [notify]);

  React.useEffect(() => { reloadData(); }, [reloadData]);
  React.useEffect(() => { applyTheme(data.churchSettings); }, [data.churchSettings]);
  React.useEffect(() => {
    const timer = setInterval(() => {
      setData(prev => {
        const nextSettings = ensureDailyVerseSettings(prev.churchSettings);
        if (nextSettings.verse_of_day === prev.churchSettings.verse_of_day && nextSettings.daily_verse_date === prev.churchSettings.daily_verse_date) return prev;
        const nextData = normalizeData({ ...prev, churchSettings: nextSettings });
        persistOffline(nextData);
        return nextData;
      });
    }, 60000);
    return () => clearInterval(timer);
  }, []);

  const updateCollection = React.useCallback(async (key, updater, options={}) => {
    const prevData = data;
    const prevItems = safeArray(prevData[key]);
    const nextItems = typeof updater === 'function' ? updater(prevItems) : safeArray(updater);
    const nextData = normalizeData({ ...prevData, [key]: nextItems });
    setData(nextData);
    await persistOffline(nextData);
    if (!options.suppressBusy) setBusyText(options.busyText || 'Saving record...');
    try {
      await syncSimpleTable(TABLES[key], prevItems, nextItems);
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
      if (!options.silentSuccess) notify('success', options.successMessage || 'Record saved successfully.');
    } catch (error) {
      setOfflineState(state => ({ ...state, mode: 'offline', pendingCount: state.pendingCount + 1, lastError: error?.message || 'Sync failed.' }));
      notify('info', options.offlineMessage || 'Saved locally. Sync is pending.');
    } finally {
      setBusyText('');
    }
  }, [data, notify]);

  const setChurchSettings = React.useCallback(async updater => {
    const nextSettings = ensureDailyVerseSettings(typeof updater === 'function' ? updater(data.churchSettings) : updater);
    const nextData = normalizeData({ ...data, churchSettings: { ...data.churchSettings, ...nextSettings, id: 1 } });
    setData(nextData);
    await persistOffline(nextData);
    setBusyText('Saving church settings...');
    try {
      await syncSettings(nextData.churchSettings);
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
      notify('success', 'Church settings saved successfully.');
    } catch (error) {
      setOfflineState(state => ({ ...state, mode: 'offline', pendingCount: state.pendingCount + 1, lastError: error?.message || 'Sync failed.' }));
      notify('info', 'Settings saved locally. Sync is pending.');
    } finally {
      setBusyText('');
    }
  }, [data, notify]);

  const flushPendingChanges = React.useCallback(async () => {
    setBusyText('Syncing pending church records...');
    try {
      if (!canSyncChurchSettings()) {
        await reloadData({ silent: true });
        setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', pendingCount: 0, lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
        notify('success', 'Records refreshed. Settings changes require an administrator account.');
        return;
      }
      await syncAll(data);
      setOfflineState(state => ({ ...state, mode: supabaseClient ? 'online' : 'offline', pendingCount: 0, lastSyncAt: supabaseClient ? nowIso() : state.lastSyncAt, lastError: '' }));
      notify('success', 'Pending records synced successfully.');
    } catch (error) {
      setOfflineState(state => ({ ...state, mode: 'offline', lastError: error?.message || 'Sync failed.' }));
      notify('error', error?.message || 'Sync failed.');
    } finally {
      setBusyText('');
    }
  }, [data, notify, reloadData]);

  const setPresenceStatus = React.useCallback(async (role, linkedId, isOnline) => {
    if (!role || !linkedId) return;
    await updateCollection('presenceRows', rows => {
      const idx = safeArray(rows).findIndex(row => row.role === role && row.linked_entity_id === linkedId);
      const payload = { id: idx >= 0 ? rows[idx].id : uid(), role, linked_entity_id: linkedId, is_online: !!isOnline, last_seen: nowIso() };
      return idx >= 0 ? rows.map((row, i) => i === idx ? { ...row, ...payload } : row) : [payload, ...rows];
    }, { silentSuccess: true, suppressBusy: true });
  }, [updateCollection]);

  const value = { data, loaded, updateCollection, setChurchSettings, reloadData, notify, notifications, dismissNotification, busyText, offlineState, flushPendingChanges, setPresenceStatus };
  return <DataContext.Provider value={value}>{children}</DataContext.Provider>;
}

function Table({ columns=[], rows=[], renderActions=null }) {
  const [search, setSearch] = React.useState('');
  const [page, setPage] = React.useState(1);
  const pageSize = 12;
  const visibleRows = React.useMemo(() => {
    const term = search.trim().toLowerCase();
    const base = term ? rows.filter(row => JSON.stringify(row).toLowerCase().includes(term)) : rows;
    return base;
  }, [rows, search]);
  const pageCount = Math.max(1, Math.ceil(visibleRows.length / pageSize));
  React.useEffect(() => { if (page > pageCount) setPage(pageCount); }, [page, pageCount]);
  const pageRows = visibleRows.slice((page - 1) * pageSize, page * pageSize);
  const cols = renderActions ? [...columns, { key: '__actions', label: 'Actions', render: renderActions }] : columns;
  return <div className="record-table-shell space-y-3">
    <div className="table-tools flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <input className="input sm:max-w-xs" placeholder="Search records..." value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} />
      <div className="flex flex-wrap items-center gap-2"><button type="button" className="btn btn-outline !py-2" onClick={() => exportRowsToCsv('church-records.csv', columns, visibleRows)} disabled={!visibleRows.length}><i className="fas fa-file-csv"></i>CSV</button><button type="button" className="btn btn-outline !py-2" onClick={() => printRows('Church Records', columns, visibleRows)} disabled={!visibleRows.length}><i className="fas fa-print"></i>Print</button><div className="text-sm font-semibold text-slate-500">{visibleRows.length} record(s)</div></div>
    </div>
    <div className="table-wrap record-table-wrap rounded-xl border bg-white">
      <table className="record-table min-w-full text-sm">
        <thead className="bg-slate-50 text-slate-600">
          <tr>{cols.map(col => <th key={col.key || col} className="text-left px-4 py-3 font-extrabold">{col.label || col}</th>)}</tr>
        </thead>
        <tbody>
          {pageRows.length ? pageRows.map(row => <tr key={row.id || JSON.stringify(row)} className="border-t hover:bg-slate-50">
            {cols.map(col => {
              const key = col.key || col;
              const val = col.render ? col.render(row) : row[key];
              return <td key={key} data-label={col.label || key} className="px-4 py-3 align-top">{React.isValidElement(val) ? val : <span className="cell-wrap">{val ?? ''}</span>}</td>;
            })}
          </tr>) : <tr><td className="px-4 py-8 text-center text-slate-500" colSpan={cols.length}>No matching records.</td></tr>}
        </tbody>
      </table>
    </div>
    <div className="table-pagination flex justify-end gap-2">
      <button className="btn btn-outline" disabled={page <= 1} onClick={() => setPage(p => Math.max(1, p - 1))}>Prev</button>
      <span className="btn btn-secondary">{page} / {pageCount}</span>
      <button className="btn btn-outline" disabled={page >= pageCount} onClick={() => setPage(p => Math.min(pageCount, p + 1))}>Next</button>
    </div>
  </div>;
}
function renderFormControl(field, form, setForm, data) {
  const value = form[field.name] ?? '';
  const update = next => setForm({ ...form, [field.name]: next });
  if (field.type === 'select') {
    const options = typeof field.options === 'function' ? field.options(data, form) : field.options || [];
    return <select className="select" required={field.required} value={value || ''} onChange={e => update(e.target.value)}>
      <option value="">{field.placeholder || 'Select'}</option>
      {options.map(opt => typeof opt === 'string' ? <option key={opt} value={opt}>{opt}</option> : <option key={opt.value} value={opt.value}>{opt.label}</option>)}
    </select>;
  }
  if (field.type === 'textarea') return <textarea className="textarea" rows={field.rows || 3} required={field.required} value={value || ''} onChange={e => update(e.target.value)} />;
  if (field.type === 'checkbox') return <label className="inline-flex items-center gap-2 font-semibold"><input type="checkbox" checked={!!value} onChange={e => update(e.target.checked)} /> {field.checkboxLabel || 'Enabled'}</label>;
  if (field.type === 'image') return <ImageUploadInput value={value || ''} folder={field.folder || field.name || 'general'} shape={field.shape || 'rounded-xl'} onChange={update} />;
  if (field.type === 'file') return <FileUploadInput value={value || ''} folder={field.folder || field.name || 'documents'} onChange={update} />;
  return <input className="input" type={field.type || 'text'} min={field.min} step={field.step} required={field.required} value={value || ''} onChange={e => update(field.type === 'number' ? e.target.value : e.target.value)} />;
}
function CrudManager({ title, subtitle='', collectionKey, columns, fields, emptyRecord, preparePayload, filterRows, initialPatch={} }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ ...emptyRecord, ...initialPatch });
  const rows = React.useMemo(() => {
    const list = safeArray(data[collectionKey]);
    return filterRows ? list.filter(row => filterRows(row, data)) : list;
  }, [data, collectionKey, filterRows]);
  const startAdd = () => { setForm({ ...emptyRecord, ...initialPatch }); setOpen(true); };
  const edit = row => { setForm({ ...emptyRecord, ...row }); setOpen(true); };
  const remove = async row => {
    if (!window.confirm(`Delete ${title.toLowerCase()} record?`)) return;
    await updateCollection(collectionKey, items => safeArray(items).filter(item => item.id !== row.id), { successMessage: 'Record deleted successfully.' });
  };
  const save = async event => {
    event.preventDefault();
    try {
      const base = { ...form, id: form.id || uid(), updated_at: nowIso() };
      if (!form.id) base.created_at = nowIso();
      const payload = preparePayload ? await preparePayload(base, data) : base;
      await updateCollection(collectionKey, items => safeArray(items).some(item => item.id === payload.id) ? safeArray(items).map(item => item.id === payload.id ? payload : item) : [payload, ...safeArray(items)]);
      setOpen(false);
      setForm({ ...emptyRecord, ...initialPatch });
    } catch (error) {
      notify('error', error?.message || 'Unable to save record.');
    }
  };
  return <div className="space-y-4">
    <SectionHeader title={title} subtitle={subtitle} actions={<button className="btn btn-primary" onClick={startAdd}><i className="fas fa-plus"></i>Add</button>} />
    <Table columns={columns} rows={rows} renderActions={row => <div className="flex gap-2"><button className="btn btn-outline !py-1.5" onClick={() => edit(row)}>Edit</button><button className="btn btn-danger !py-1.5" onClick={() => remove(row)}>Delete</button></div>} />
    <Modal open={open} title={form.id ? `Edit ${title}` : `Add ${title}`} onClose={() => setOpen(false)}>
      <form onSubmit={save} className="space-y-4">
        <div className="grid md:grid-cols-2 gap-4">
          {fields.map(field => <Field key={field.name} label={field.label}><div className={field.full ? 'md:col-span-2' : ''}>{renderFormControl(field, form, setForm, data)}</div></Field>)}
        </div>
        <div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Save</button></div>
      </form>
    </Modal>
  </div>;
}

function PrayerRequestsManagement({ filterFn=null, initialPatch={} }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const emptyRecord = { member_id: '', requester_name: '', request_type: 'Prayer', privacy_level: 'Prayer Team', priority: 'Normal', status: 'Open', assigned_minister_id: '', request_text: '', private_notes: '', requested_at: nowIso(), prayed_at: '', answered_at: '', closed_at: '' };
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ ...emptyRecord, ...initialPatch });
  const rows = React.useMemo(() => {
    const prayerRows = safeArray(data.careRequests).filter(row => (row.request_type || 'Prayer') === 'Prayer');
    return filterFn ? prayerRows.filter(row => filterFn(row, data)) : prayerRows;
  }, [data, filterFn]);
  const edit = row => { setForm({ ...emptyRecord, ...row }); setOpen(true); };
  const remove = async row => {
    if (!window.confirm('Delete prayer request?')) return;
    await updateCollection('careRequests', items => safeArray(items).filter(item => item.id !== row.id), { successMessage: 'Prayer request deleted successfully.' });
  };
  const save = async event => {
    event.preventDefault();
    if (!form.request_text.trim()) { notify('error', 'Prayer request is required.'); return; }
    const payload = {
      ...emptyRecord,
      ...form,
      ...initialPatch,
      id: form.id || uid(),
      request_type: 'Prayer',
      requested_at: form.requested_at || nowIso(),
      closed_at: form.status === 'Closed' ? (form.closed_at || nowIso()) : '',
      updated_at: nowIso()
    };
    if (!form.id) payload.created_at = nowIso();
    await updateCollection('careRequests', items => safeArray(items).some(item => item.id === payload.id) ? safeArray(items).map(item => item.id === payload.id ? payload : item) : [payload, ...safeArray(items)], { successMessage: 'Prayer request saved successfully.' });
    setOpen(false);
    setForm({ ...emptyRecord, ...initialPatch });
  };
  const updatePrayer = async (row, patch) => {
    await updateCollection('careRequests', items => safeArray(items).map(item => item.id === row.id ? { ...item, ...patch, updated_at: nowIso() } : item), { successMessage: 'Prayer request updated successfully.' });
  };
  const columns = [
    { key: 'requester', label: 'Name', render: r => prayerRequesterName(data, r) },
    { key: 'privacy_level', label: 'Privacy', render: r => r.privacy_level || 'Prayer Team' },
    { key: 'priority', label: 'Priority', render: r => <span className={`pill ${statusClass(r.priority)}`}>{r.priority || 'Normal'}</span> },
    { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status || 'Open'}</span> },
    { key: 'assigned_minister_id', label: 'Assigned Minister', render: r => ministerName(data, r.assigned_minister_id) },
    { key: 'requested_at', label: 'Submitted', render: r => r.requested_at ? new Date(r.requested_at).toLocaleDateString() : '' },
    { key: 'request_text', label: 'Request' }
  ];
  return <div className="space-y-4">
    <SectionHeader title="Prayer Requests" actions={<button className="btn btn-primary" onClick={() => { setForm({ ...emptyRecord, ...initialPatch }); setOpen(true); }}><i className="fas fa-plus"></i>Add Prayer Request</button>} />
    <Table columns={columns} rows={rows} renderActions={row => <div className="flex flex-wrap gap-2">
      {!row.prayed_at && <button className="btn btn-outline !py-1.5" onClick={() => updatePrayer(row, { prayed_at: nowIso(), status: row.status === 'Open' ? 'In Progress' : row.status })}>Prayed</button>}
      {!row.answered_at && <button className="btn btn-outline !py-1.5" onClick={() => updatePrayer(row, { prayed_at: row.prayed_at || nowIso(), answered_at: nowIso(), status: 'Closed', closed_at: nowIso() })}>Answered</button>}
      <button className="btn btn-outline !py-1.5" onClick={() => edit(row)}>Edit</button>
      <button className="btn btn-danger !py-1.5" onClick={() => remove(row)}>Delete</button>
    </div>} />
    <Modal open={open} title={form.id ? 'Edit Prayer Request' : 'Add Prayer Request'} onClose={() => setOpen(false)}>
      <form onSubmit={save} className="space-y-4">
        <div className="grid md:grid-cols-2 gap-4">
          <Field label="Member"><select className="select" value={form.member_id || ''} onChange={e => setForm({ ...form, member_id: e.target.value })}><option value="">Select</option>{optionRows(data.members, 'full_name').map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select></Field>
          <Field label="Name"><input className="input" value={form.requester_name || ''} onChange={e => setForm({ ...form, requester_name: e.target.value })} /></Field>
          <Field label="Privacy"><select className="select" value={form.privacy_level || 'Prayer Team'} onChange={e => setForm({ ...form, privacy_level: e.target.value })}>{PRAYER_PRIVACY_OPTIONS.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Priority"><select className="select" value={form.priority || 'Normal'} onChange={e => setForm({ ...form, priority: e.target.value })}>{PRIORITIES.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Status"><select className="select" value={form.status || 'Open'} onChange={e => setForm({ ...form, status: e.target.value })}>{REQUEST_STATUSES.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Assigned Minister"><select className="select" value={form.assigned_minister_id || ''} onChange={e => setForm({ ...form, assigned_minister_id: e.target.value })}><option value="">Select</option>{optionRows(data.ministers, 'full_name').map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select></Field>
          <div className="md:col-span-2"><Field label="Request"><textarea className="textarea" required value={form.request_text || ''} onChange={e => setForm({ ...form, request_text: e.target.value })}></textarea></Field></div>
          <div className="md:col-span-2"><Field label="Private Notes"><textarea className="textarea" value={form.private_notes || ''} onChange={e => setForm({ ...form, private_notes: e.target.value })}></textarea></Field></div>
        </div>
        <div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Save</button></div>
      </form>
    </Modal>
  </div>;
}

function CertificatesManagement() {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const emptyRecord = { member_id: '', certificate_type: 'Membership', certificate_date: today(), authorized_by: data.churchSettings.general_overseer_name || 'General Overseer', notes: '' };
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState(emptyRecord);
  const startCreate = () => { setForm({ ...emptyRecord, authorized_by: data.churchSettings.general_overseer_name || 'General Overseer' }); setOpen(true); };
  const save = async event => {
    event.preventDefault();
    if (!form.member_id) { notify('error', 'Select a member.'); return; }
    const payload = { ...form, id: uid(), certificate_number: certificateNumber(data), certificate_date: form.certificate_date || today(), issued_at: nowIso(), created_at: nowIso(), updated_at: nowIso() };
    await updateCollection('certificates', rows => [payload, ...safeArray(rows)], { successMessage: 'Certificate created successfully.' });
    setOpen(false);
  };
  const remove = async row => {
    if (!window.confirm('Delete certificate?')) return;
    await updateCollection('certificates', rows => safeArray(rows).filter(item => item.id !== row.id), { successMessage: 'Certificate deleted successfully.' });
  };
  return <div className="space-y-4">
    <SectionHeader title="Membership Certificate Generator" actions={<button className="btn btn-primary" onClick={startCreate}><i className="fas fa-plus"></i>Create Certificate</button>} />
    <Table columns={[
      { key: 'certificate_number', label: 'Certificate No' },
      { key: 'member_id', label: 'Member', render: r => certificateMemberName(data, r) },
      { key: 'certificate_type', label: 'Type' },
      { key: 'certificate_date', label: 'Date' },
      { key: 'authorized_by', label: 'Authorized By' }
    ]} rows={data.certificates} renderActions={row => <div className="flex flex-wrap gap-2"><button className="btn btn-outline !py-1.5" onClick={() => printCertificate(row, data)}>Print</button><button className="btn btn-danger !py-1.5" onClick={() => remove(row)}>Delete</button></div>} />
    <Modal open={open} title="Create Certificate" onClose={() => setOpen(false)}>
      <form onSubmit={save} className="space-y-4">
        <div className="grid md:grid-cols-2 gap-4">
          <Field label="Member"><select className="select" required value={form.member_id || ''} onChange={e => setForm({ ...form, member_id: e.target.value })}><option value="">Select</option>{optionRows(data.members, 'full_name').map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}</select></Field>
          <Field label="Certificate Type"><select className="select" value={form.certificate_type || 'Membership'} onChange={e => setForm({ ...form, certificate_type: e.target.value })}>{CERTIFICATE_TYPES.map(x => <option key={x}>{x}</option>)}</select></Field>
          <Field label="Date"><input className="input" type="date" value={form.certificate_date || today()} onChange={e => setForm({ ...form, certificate_date: e.target.value })} required /></Field>
          <Field label="Authorized By"><input className="input" value={form.authorized_by || ''} onChange={e => setForm({ ...form, authorized_by: e.target.value })} /></Field>
          <div className="md:col-span-2"><Field label="Notes"><textarea className="textarea" value={form.notes || ''} onChange={e => setForm({ ...form, notes: e.target.value })}></textarea></Field></div>
        </div>
        <div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Create</button></div>
      </form>
    </Modal>
  </div>;
}

function nextAnnualDate(value) {
  if (!value) return '';
  const [, month, day] = String(value).split('-');
  if (!month || !day) return '';
  const now = new Date();
  let next = new Date(now.getFullYear(), Number(month) - 1, Number(day));
  if (next < new Date(now.getFullYear(), now.getMonth(), now.getDate())) next = new Date(now.getFullYear() + 1, Number(month) - 1, Number(day));
  return next.toISOString().slice(0, 10);
}
function daysUntil(dateValue) {
  if (!dateValue) return 9999;
  const start = new Date(`${today()}T00:00:00`);
  const end = new Date(`${dateValue}T00:00:00`);
  return Math.round((end - start) / 86400000);
}

function ChatManagement({ role, linkedId }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const [receiver, setReceiver] = React.useState('');
  const [message, setMessage] = React.useState('');
  const [actionMessageId, setActionMessageId] = React.useState('');
  const [editingMessageId, setEditingMessageId] = React.useState('');
  const [editingText, setEditingText] = React.useState('');
  const holdTimerRef = React.useRef(null);
  const isOwnMessage = React.useCallback(msg => msg.sender_role === role && (role === 'admin' ? !msg.sender_id : msg.sender_id === linkedId), [role, linkedId]);
  const clearHoldTimer = React.useCallback(() => {
    if (holdTimerRef.current) window.clearTimeout(holdTimerRef.current);
    holdTimerRef.current = null;
  }, []);
  const startHold = React.useCallback(msg => {
    if (!isOwnMessage(msg)) return;
    clearHoldTimer();
    holdTimerRef.current = window.setTimeout(() => setActionMessageId(msg.id), 520);
  }, [clearHoldTimer, isOwnMessage]);
  React.useEffect(() => clearHoldTimer, [clearHoldTimer]);
  const contacts = React.useMemo(() => {
    const list = [];
    if (role !== 'member') {
      data.ministers.forEach(x => list.push({ role: x.title?.toLowerCase().includes('senior') ? 'senior_pastor' : 'pastor', id: x.id, label: `${x.full_name} (${x.title})` }));
      data.financeOfficers.forEach(x => list.push({ role: 'finance_officer', id: x.id, label: `${x.full_name} (Finance)` }));
      data.members.forEach(x => list.push({ role: x.id === linkedId ? 'member' : 'member', id: x.id, label: `${x.full_name} (Member)` }));
    } else {
      data.ministers.forEach(x => list.push({ role: x.title?.toLowerCase().includes('senior') ? 'senior_pastor' : 'pastor', id: x.id, label: `${x.full_name} (${x.title})` }));
      data.members.filter(x => x.id !== linkedId).slice(0, 20).forEach(x => list.push({ role: 'member', id: x.id, label: `${x.full_name} (Member)` }));
    }
    return list.filter(x => !(x.role === role && x.id === linkedId));
  }, [data, role, linkedId]);
  const messages = data.chats.filter(msg => {
    const mineSender = msg.sender_role === role && (role === 'admin' ? !msg.sender_id : msg.sender_id === linkedId);
    const mineReceiver = msg.receiver_role === role && (role === 'admin' ? !msg.receiver_id : msg.receiver_id === linkedId);
    if (!mineSender && !mineReceiver) return false;
    if (mineSender && msg.deleted_by_sender) return false;
    if (mineReceiver && msg.deleted_by_receiver) return false;
    if (!receiver) return true;
    const [rRole, rId] = receiver.split('|');
    return (mineSender && msg.receiver_role === rRole && String(msg.receiver_id || '') === rId) || (mineReceiver && msg.sender_role === rRole && String(msg.sender_id || '') === rId);
  }).sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  const send = async e => {
    e.preventDefault();
    if (!receiver || !message.trim()) return;
    const [receiver_role, receiver_id] = receiver.split('|');
    const payload = { id: uid(), sender_role: role, sender_id: role === 'admin' ? null : linkedId, receiver_role, receiver_id: receiver_id || null, message: message.trim(), is_read: false, deleted_by_sender: false, deleted_by_receiver: false, flagged: false, created_at: nowIso() };
    await updateCollection('chats', rows => [...safeArray(rows), payload], { silentSuccess: true, suppressBusy: true });
    setMessage('');
  };
  const beginEdit = msg => {
    if (!isOwnMessage(msg)) return;
    setEditingMessageId(msg.id);
    setEditingText(msg.message || '');
    setActionMessageId('');
  };
  const cancelEdit = () => {
    setEditingMessageId('');
    setEditingText('');
  };
  const saveEdit = async e => {
    e.preventDefault();
    const text = editingText.trim();
    if (!editingMessageId || !text) return;
    await updateCollection('chats', rows => safeArray(rows).map(row => row.id === editingMessageId ? { ...row, message: text } : row), { silentSuccess: true, suppressBusy: true, offlineMessage: 'Message edited here. Sync is pending.' });
    cancelEdit();
  };
  const deleteMessage = async msg => {
    if (!isOwnMessage(msg)) return;
    if (!window.confirm('Delete this sent message?')) return;
    await updateCollection('chats', rows => safeArray(rows).filter(row => row.id !== msg.id), { silentSuccess: true, suppressBusy: true, offlineMessage: 'Message deleted here. Sync is pending.' });
    setActionMessageId('');
    if (editingMessageId === msg.id) cancelEdit();
  };
  return <div className="space-y-4">
    <SectionHeader title="Church Chat" />
    <div className="grid lg:grid-cols-[320px,1fr] gap-4">
      <div className="card p-4 space-y-3">
        <Field label="Recipient"><select className="select" value={receiver} onChange={e => setReceiver(e.target.value)}><option value="">All conversations</option>{contacts.map(c => <option key={`${c.role}|${c.id}`} value={`${c.role}|${c.id}`}>{c.label}</option>)}</select></Field>
        <form onSubmit={send} className="space-y-3"><textarea className="textarea" value={message} onChange={e => setMessage(e.target.value)} placeholder="Write message..."></textarea><button className="btn btn-primary w-full"><i className="fas fa-paper-plane"></i>Send</button></form>
      </div>
      <div className="space-y-3">
        {messages.length ? messages.map(msg => {
          const isMine = isOwnMessage(msg);
          const actionOpen = actionMessageId === msg.id;
          const sender = msg.sender_role === 'admin' ? 'Church Admin' : msg.sender_role.includes('pastor') ? ministerName(data, msg.sender_id) : msg.sender_role === 'finance_officer' ? nameBy(data.financeOfficers, msg.sender_id, 'full_name') : memberName(data, msg.sender_id);
          return <div

            onPointerDown={() => startHold(msg)}
            onPointerUp={clearHoldTimer}
            onPointerLeave={clearHoldTimer}
            onPointerCancel={clearHoldTimer}
            onContextMenu={event => { if (isMine) { event.preventDefault(); setActionMessageId(actionOpen ? '' : msg.id); } }}
          >
            <div className="flex justify-between gap-3">
              <div className="font-bold min-w-0">{sender}</div>
              <div className="flex items-center gap-2 shrink-0">
                <div className="text-xs text-slate-400">{new Date(msg.created_at).toLocaleString()}</div>
                {isMine && <button type="button" className="w-8 h-8 rounded-lg border bg-white text-slate-600 no-print" aria-label="Message actions" onClick={event => { event.stopPropagation(); setActionMessageId(actionOpen ? '' : msg.id); }}><i className="fas fa-ellipsis"></i></button>}
              </div>

function AppShell() {
  const store = React.useContext(DataContext);
  const [session, setSession] = React.useState({ role: null, linkedId: null, credentialId: null, username: '' });
  const [activeNav, setActiveNav] = React.useState('dashboard');
  const [mobileNavOpen, setMobileNavOpen] = React.useState(false);
  const [forcePasswordModal, setForcePasswordModal] = React.useState(false);
  React.useEffect(() => {
    if (!store.loaded) return;
    try {
      localStorage.removeItem(SESSION_KEY);
      const saved = JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null');
      if (!saved?.role || !saved?.sessionToken) return;
      if (saved.sessionExpiresAt && new Date(saved.sessionExpiresAt).getTime() <= Date.now()) {
        sessionStorage.removeItem(SESSION_KEY);
        setSupabaseSessionToken('');
        setActiveSessionRole('');
        return;
      }
      setSupabaseSessionToken(saved.sessionToken);
      setActiveSessionRole(saved.role);
      setSession(saved);
      store.reloadData({ silent: true }).then(ok => {
        if (!ok) {
          setSupabaseSessionToken('');
          setActiveSessionRole('');
          sessionStorage.removeItem(SESSION_KEY);
          setSession({ role: null, linkedId: null, credentialId: null, username: '' });
          return;
        }
        store.setPresenceStatus(saved.role, saved.linkedId, true);
      }).catch(() => {});
    } catch (e) {}
  }, [store.loaded]);
  const loginWithCredentials = async (username, password) => {
    const lower = String(username || '').trim().toLowerCase();
    const client = publicSupabaseClient || supabaseClient;
    if (!client) throw new Error('Supabase is not configured.');
    const { data: result, error } = await client.rpc('church_login', { p_username: lower, p_password: String(password || '') });
    if (error) throw new Error(store.data.churchSettings.failed_login_greeting_message || 'Login failed.');
    const credential = Array.isArray(result) ? result[0] : result;
    if (!credential?.session_token) throw new Error(store.data.churchSettings.failed_login_greeting_message || 'Login failed.');
    setSupabaseSessionToken(credential.session_token);
    setActiveSessionRole(credential.role);
    const next = {
      role: credential.role,
      linkedId: credential.linked_entity_id || null,
      credentialId: credential.id,
      username: credential.username,
      sessionToken: credential.session_token,
      sessionExpiresAt: credential.expires_at || ''
    };
    setSession(next);
    setActiveNav('dashboard');
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(next));
    const loaded = await store.reloadData({ silent: true });
    if (!loaded) {
      setSupabaseSessionToken('');
      setActiveSessionRole('');
      sessionStorage.removeItem(SESSION_KEY);
      setSession({ role: null, linkedId: null, credentialId: null, username: '' });
      throw new Error('Secure login succeeded, but records could not load. Run the production SQL update and try again.');
    }
    await store.setPresenceStatus(credential.role, credential.linked_entity_id, true);
    if (boolValue(credential.force_password_change)) setForcePasswordModal(true);
  };
  const logout = async () => {
    if (session.role) await store.setPresenceStatus(session.role, session.linkedId, false);
    try {
      if (hasActiveSessionToken() && supabaseClient) await supabaseClient.rpc('church_logout');
    } catch (error) {}
    setSupabaseSessionToken('');
    setActiveSessionRole('');
    setSession({ role: null, linkedId: null, credentialId: null, username: '' });
    setActiveNav('dashboard');
    sessionStorage.removeItem(SESSION_KEY);
    store.reloadData({ silent: true });
  };
  const changeOwnPassword = async (currentPassword, newPassword) => {
    if (!supabaseClient) throw new Error('Supabase is not configured.');
    const { error } = await supabaseClient.rpc('church_change_password', { p_current_password: currentPassword, p_new_password: newPassword });
    if (error) throw error;
    store.notify('success', 'Password changed successfully.');
    await store.reloadData({ silent: true });
    setForcePasswordModal(false);
  };
  const contextValue = { session, setSession, activeNav, setActiveNav, loginWithCredentials, logout, mobileNavOpen, setMobileNavOpen, forcePasswordModal, setForcePasswordModal, changeOwnPassword };
  if (!store.loaded) return <BusyOverlay text="Loading church management system..." />;
  return <SessionContext.Provider value={contextValue}>
    <div className="min-h-screen flex flex-col">
      <Header />
      <OfflineBanner state={store.offlineState} onSync={store.flushPendingChanges} />
      <LicenseExpiryNotice />
      <div className="flex flex-1 min-h-0">
        {session.role && <Sidebar />}
        <main className="flex-1 p-3 md:p-6 overflow-x-hidden">{!session.role ? <LoginScreen /> : <DashboardRouter />}</main>
      </div>
      <AppFooter />
      {session.role && session.role !== 'superadmin' && !isWholeChurchPortalRestricted(session.role, store.data.churchSettings) && <ForcePasswordChangeModal />}
      <BusyOverlay text={store.busyText} />
      <ToastStack notifications={store.notifications} onDismiss={store.dismissNotification} />
    </div>
  </SessionContext.Provider>;
}

function ForcePasswordChangeModal() {
  const { forcePasswordModal, changeOwnPassword } = React.useContext(SessionContext);

  const [password, setPassword] = React.useState('');

function ChurchAdminLicenseUsage({ lockedMode=false }) {

function SuperAdminChurchAdminCredentialPanel({ embedded=false }) {
  const { data, reloadData, notify } = React.useContext(DataContext);
  const adminCredential = data.credentials.find(row => row.role === 'admin') || { id: '', role: 'admin', username: 'admin', force_password_change: true, account_active: true };
  const [form, setForm] = React.useState({ username: adminCredential.username || 'admin', password: '', force_password_change: true });
  const [lastIssuedPassword, setLastIssuedPassword] = React.useState('');
  React.useEffect(() => setForm(prev => ({ ...prev, username: adminCredential.username || 'admin', force_password_change: boolValue(adminCredential.force_password_change) })), [adminCredential.username, adminCredential.force_password_change]);
  const saveAdminCredential = async (event, overridePassword='', forcePasswordOverride=null) => {
    if (event?.preventDefault) event.preventDefault();
    const username = String(form.username || '').trim().toLowerCase();
    const password = overridePassword || String(form.password || '').trim();
    if (!username) { notify('error', 'Church Admin username is required.'); return; }
    if (!adminCredential.id && password.length < 8) { notify('error', 'New Church Admin credentials need a password of at least 8 characters.'); return; }
    if (adminCredential.id && password && password.length < 8) { notify('error', 'New password must be at least 8 characters.'); return; }
    try {
      if (!supabaseClient) throw new Error('Supabase is not configured.');
      const { error } = await supabaseClient.rpc('church_admin_save_credential', {
        p_id: adminCredential.id || null,
        p_role: 'admin',
        p_linked_entity_type: null,
        p_linked_entity_id: null,
        p_username: username,
        p_password: password || null,
        p_force_password_change: forcePasswordOverride === null ? !!form.force_password_change : !!forcePasswordOverride,
        p_account_active: true
      });
      if (error) throw error;
      await reloadData({ silent: true });
      if (password) setLastIssuedPassword(password);
      setForm(current => ({ ...current, password: '' }));
      notify('success', password ? `Church Admin credentials saved. New password: ${password}` : 'Church Admin credentials saved.');
    } catch (error) {
      notify('error', error?.message || 'Unable to save Church Admin credentials.');
    }
  };
  const generateAdminCredential = () => setForm(prev => ({ ...prev, username: `churchadmin${Math.floor(Math.random() * 900 + 100)}`, password: generatePassword(), force_password_change: true }));
  const resetAdminPassword = () => {
    const nextPassword = generatePassword();
    setForm(prev => ({ ...prev, password: nextPassword, force_password_change: true }));
    saveAdminCredential(null, nextPassword, true);
  };
  return <div className="card p-5 space-y-4">
    {!embedded && <SectionHeader title="Issue Church Admin Credentials" subtitle="Only the Super Admin can issue, update, or reset the Church Admin login credentials." actions={<button type="button" onClick={generateAdminCredential} className="btn btn-outline"><i className="fas fa-wand-magic-sparkles"></i>Generate Unique Credentials</button>} />}
    {embedded && <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-3"><div><h3 className="font-extrabold text-lg">Issue Church Admin Credentials</h3><p className="text-sm text-slate-500 mt-1">Create or reset the Church Admin login from Super Admin maintenance.</p></div><button type="button" onClick={generateAdminCredential} className="btn btn-outline"><i className="fas fa-wand-magic-sparkles"></i>Generate</button></div>}
    <form onSubmit={saveAdminCredential} className="grid md:grid-cols-[1fr_1fr_220px_auto] gap-4 items-end">
      <Field label="Church Admin Username"><input className="input" value={form.username} onChange={e => setForm({ ...form, username: e.target.value })} /></Field>
      <Field label="New Password"><input className="input" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })} placeholder={adminCredential.id ? 'Leave blank to keep current password' : 'Required for new account'} /></Field>
      <Field label="Force Password Change"><label className="inline-flex items-center gap-2 font-semibold min-h-[42px]"><input type="checkbox" checked={!!form.force_password_change} onChange={e => setForm({ ...form, force_password_change: e.target.checked })} /> Required</label></Field>
      <button className="btn btn-primary" type="submit">Save Credentials</button>
    </form>
    <div className="flex flex-wrap gap-2"><button className="btn btn-outline" type="button" onClick={resetAdminPassword}><i className="fas fa-key"></i>Reset Church Admin Password Only</button></div>
    <div className="rounded-xl bg-slate-50 border border-slate-200 p-3 text-sm">
      <b>Current Church Admin:</b> {adminCredential.username || 'Not set'} <span className="mx-2">|</span> <b>Password:</b> {lastIssuedPassword ? <span className="font-mono">{lastIssuedPassword}</span> : 'Hidden for security. Reset to issue a new password.'} <span className="mx-2">|</span> <b>Force Password Change:</b> {boolValue(adminCredential.force_password_change) ? 'Yes' : 'No'}
    </div>
  </div>;
}
function SuperAdminAccessPanel({ embedded=false }) {

  const restricted = isChurchAdminAccessRestricted(data.churchSettings);
  const setAdminLock = async locked => {
    const checkedAt = nowIso();
    await setChurchSettings(current => {
      if (locked) {
        return {
          ...current,
          admin_access_locked: true,
          platform_access_locked: true,
          church_license_status: current.church_license_code ? 'Suspended' : (current.church_license_status || defaultChurch.church_license_status),
          church_license_activated_at: current.church_license_code ? '' : current.church_license_activated_at,
          church_license_last_checked_at: checkedAt
        };
      }
      const suspended = isSuspendedLicense(current);
      return {
        ...current,
        admin_access_locked: false,
        platform_access_locked: false,
        church_license_plan: suspended ? '' : current.church_license_plan,
        church_license_label: suspended ? defaultChurch.church_license_label : current.church_license_label,
        church_license_code: suspended ? '' : current.church_license_code,
        church_license_status: suspended ? 'Not Issued' : (current.church_license_code ? 'Active' : (current.church_license_status || defaultChurch.church_license_status)),

        church_license_expires_at: suspended ? '' : current.church_license_expires_at,
        church_license_last_checked_at: checkedAt

  };
  return <div className="space-y-5">

        <Field label="Full Name"><input className="input" value={form.full_name || ''} onChange={e => setForm({ ...form, full_name: e.target.value })} /></Field>
        <Field label="Phone"><input className="input" value={form.phone || ''} onChange={e => setForm({ ...form, phone: e.target.value })} /></Field>
        <Field label="Email"><input className="input" value={form.email || ''} onChange={e => setForm({ ...form, email: e.target.value })} /></Field>
        <Field label="Address"><input className="input" value={form.address || ''} onChange={e => setForm({ ...form, address: e.target.value })} /></Field>
        <Field label="Primary Ministry"><input className="input" readOnly value={ministryName(data, form.primary_ministry_id)} /></Field>
        <Field label="Membership Status"><input className="input" readOnly value={form.membership_status || ''} /></Field>
      </div>
      <div className="flex justify-end"><button className="btn btn-primary">Save Profile</button></div>
    </form>
    <div className="grid lg:grid-cols-2 gap-4">
      <div className="card p-5"><h3 className="font-extrabold mb-3">Ministry History</h3><Table columns={[{ key: 'ministry_id', label: 'Ministry', render: r => ministryName(data, r.ministry_id) }, { key: 'role_title', label: 'Role' }, { key: 'joined_at', label: 'Joined' }, { key: 'active', label: 'Status', render: r => r.active ? 'Active' : 'Inactive' }]} rows={myMinistries} /></div>
      <div className="card p-5"><h3 className="font-extrabold mb-3">Prayer and Care History</h3><Table columns={[{ key: 'requested_at', label: 'Date', render: r => r.requested_at ? new Date(r.requested_at).toLocaleDateString() : '' }, { key: 'privacy_level', label: 'Privacy' }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'request_text', label: 'Request' }]} rows={myPrayers} /></div>
      <div className="card p-5"><h3 className="font-extrabold mb-3">Pastoral Visits</h3><Table columns={[{ key: 'visit_date', label: 'Date' }, { key: 'minister_id', label: 'Minister', render: r => ministerName(data, r.minister_id) }, { key: 'visit_type', label: 'Type' }, { key: 'status', label: 'Status' }]} rows={myVisits} /></div>
      <div className="card p-5"><h3 className="font-extrabold mb-3">Certificates and Welfare</h3><Table columns={[{ key: 'kind', label: 'Record' }, { key: 'date', label: 'Date' }, { key: 'detail', label: 'Detail' }, { key: 'status', label: 'Status' }]} rows={[...myCertificates.map(row => ({ id: row.id, kind: row.certificate_type, date: row.certificate_date, detail: row.certificate_number, status: 'Issued' })), ...myWelfare.map(row => ({ id: row.id, kind: row.support_type, date: row.support_date, detail: money(row.amount), status: row.status }))]} /></div>
    </div>
  </div>;
}
function MemberGivingView({ member }) {
  const { data } = React.useContext(DataContext);
  const rows = data.giving.filter(row => row.member_id === member.id);
  return <div className="space-y-4"><SectionHeader title="My Giving" subtitle={`Total: ${money(sumBy(rows, 'amount'))}`} /><Table columns={[{ key: 'giving_date', label: 'Date' }, { key: 'fund_id', label: 'Fund', render: r => fundName(data, r.fund_id) }, { key: 'amount', label: 'Amount', render: r => <span className="font-extrabold text-emerald-700">{money(r.amount)}</span> }, { key: 'payment_method', label: 'Method' }, { key: 'reference', label: 'Reference' }]} rows={rows} /></div>;
}
function MemberPledgesView({ member }) {
  const { data } = React.useContext(DataContext);
  const rows = data.pledges.filter(row => row.member_id === member.id);
  return <div className="space-y-4"><SectionHeader title="My Pledges" /><Table columns={[{ key: 'fund_id', label: 'Fund', render: r => fundName(data, r.fund_id) }, { key: 'pledge_date', label: 'Pledge Date' }, { key: 'pledge_amount', label: 'Pledged', render: r => money(r.pledge_amount) }, { key: 'amount_received', label: 'Received', render: r => money(r.amount_received) }, { key: 'balance', label: 'Balance', render: r => money(Math.max(Number(r.pledge_amount || 0) - Number(r.amount_received || 0), 0)) }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }]} rows={rows} /></div>;
}
function MemberAttendanceView({ member }) {
  const { data } = React.useContext(DataContext);
  const rows = data.attendance.filter(row => row.member_id === member.id);
  return <div className="space-y-4"><SectionHeader title="My Attendance" /><Table columns={[{ key: 'service_id', label: 'Service', render: r => serviceLabel(data, r.service_id) }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'checked_in_at', label: 'Checked In', render: r => r.checked_in_at ? new Date(r.checked_in_at).toLocaleString() : '' }, { key: 'notes', label: 'Notes' }]} rows={rows} /></div>;
}
function MemberCareView({ member }) {
  const { data, updateCollection, notify } = React.useContext(DataContext);
  const [open, setOpen] = React.useState(false);
  const [form, setForm] = React.useState({ privacy_level: 'Prayer Team', priority: 'Normal', request_text: '' });
  const rows = data.careRequests.filter(row => row.member_id === member.id && (row.request_type || 'Prayer') === 'Prayer');
  const save = async e => {
    e.preventDefault();
    if (!form.request_text.trim()) { notify('error', 'Prayer request is required.'); return; }
    const payload = { id: uid(), member_id: member.id, requester_name: member.full_name, request_type: 'Prayer', privacy_level: form.privacy_level, priority: form.priority, status: 'Open', assigned_minister_id: '', request_text: form.request_text.trim(), private_notes: '', requested_at: nowIso(), prayed_at: '', answered_at: '', closed_at: '' };
    await updateCollection('careRequests', items => [payload, ...safeArray(items)], { successMessage: 'Prayer request submitted successfully.' });
    setForm({ privacy_level: 'Prayer Team', priority: 'Normal', request_text: '' });
    setOpen(false);
  };
  return <div className="space-y-4"><SectionHeader title="Prayer Requests" actions={<button className="btn btn-primary" onClick={() => setOpen(true)}><i className="fas fa-plus"></i>Submit Prayer Request</button>} /><Table columns={[{ key: 'privacy_level', label: 'Privacy', render: r => r.privacy_level || 'Prayer Team' }, { key: 'priority', label: 'Priority', render: r => <span className={`pill ${statusClass(r.priority)}`}>{r.priority}</span> }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'assigned_minister_id', label: 'Assigned Minister', render: r => ministerName(data, r.assigned_minister_id) }, { key: 'request_text', label: 'Request' }]} rows={rows} /><Modal open={open} title="Submit Prayer Request" onClose={() => setOpen(false)}><form onSubmit={save} className="space-y-4"><div className="grid md:grid-cols-2 gap-4"><Field label="Privacy"><select className="select" value={form.privacy_level} onChange={e => setForm({ ...form, privacy_level: e.target.value })}>{PRAYER_PRIVACY_OPTIONS.map(x => <option key={x}>{x}</option>)}</select></Field><Field label="Priority"><select className="select" value={form.priority} onChange={e => setForm({ ...form, priority: e.target.value })}>{PRIORITIES.map(x => <option key={x}>{x}</option>)}</select></Field></div><Field label="Request"><textarea className="textarea" value={form.request_text} onChange={e => setForm({ ...form, request_text: e.target.value })}></textarea></Field><div className="flex justify-end gap-2"><button type="button" className="btn btn-secondary" onClick={() => setOpen(false)}>Cancel</button><button className="btn btn-primary">Submit</button></div></form></Modal></div>;
}
function MemberEventsView({ member }) {
  const { data, updateCollection } = React.useContext(DataContext);
  const register = async event => {
    const exists = data.eventRegistrations.some(row => row.event_id === event.id && row.member_id === member.id);
    if (exists) return;
    const payload = { id: uid(), event_id: event.id, member_id: member.id, visitor_name: '', registration_status: 'Registered', registered_at: nowIso(), notes: '' };
    await updateCollection('eventRegistrations', rows => [payload, ...safeArray(rows)], { successMessage: 'Event registration saved successfully.' });
  };
  const rows = data.events.map(event => ({ ...event, registered: data.eventRegistrations.some(row => row.event_id === event.id && row.member_id === member.id) }));
  return <div className="space-y-4"><SectionHeader title="Events" /><Table columns={[{ key: 'title', label: 'Event' }, { key: 'ministry_id', label: 'Ministry', render: r => ministryName(data, r.ministry_id) }, { key: 'event_date', label: 'Date' }, { key: 'venue', label: 'Venue' }, { key: 'status', label: 'Status', render: r => <span className={`pill ${statusClass(r.status)}`}>{r.status}</span> }, { key: 'registered', label: 'Registration', render: r => r.registered ? <span className="pill active">Registered</span> : <button className="btn btn-outline !py-1.5" onClick={() => register(r)}>Register</button> }]} rows={rows} /></div>;
}
function MemberDashboard({ activeNav }) {
  const { data } = React.useContext(DataContext);
  const { session } = React.useContext(SessionContext);
  const member = data.members.find(x => x.id === session.linkedId);
  if (!member) return <EmptyState text="No linked member record found." />;
  if (activeNav === 'profile') return <MemberProfile member={member} />;
  if (activeNav === 'giving') return <MemberGivingView member={member} />;
  if (activeNav === 'pledges') return <MemberPledgesView member={member} />;
  if (activeNav === 'attendance') return <MemberAttendanceView member={member} />;
  if (activeNav === 'care') return <MemberCareView member={member} />;
  if (activeNav === 'events') return <MemberEventsView member={member} />;
  if (activeNav === 'announcements') return <AnnouncementsManagement readOnly />;
  if (activeNav === 'chat') return <ChatManagement role="member" linkedId={member.id} />;
  const myGiving = data.giving.filter(g => g.member_id === member.id);
  const myAttendance = data.attendance.filter(a => a.member_id === member.id);
  return <div className="space-y-5"><SectionHeader title={`Welcome, ${member.full_name}`} subtitle={`${member.member_number || ''} | ${member.membership_status}`} /><div className="grid-fit"><StatCard label="My Giving" value={money(sumBy(myGiving, 'amount'))} icon="hand-holding-dollar" /><StatCard label="Attendance Records" value={myAttendance.length} icon="clipboard-check" accent="blue" /><StatCard label="Open Prayer Requests" value={data.careRequests.filter(c => c.member_id === member.id && (c.request_type || 'Prayer') === 'Prayer' && c.status !== 'Closed').length} icon="hands-praying" accent="amber" /><StatCard label="My Ministry" value={ministryName(data, member.primary_ministry_id)} icon="people-group" accent="purple" /></div><MemberProfile member={member} /></div>;
}
function AppFooter() {
  const { data } = React.useContext(DataContext);
  const verse = ensureDailyVerseSettings(data.churchSettings).verse_of_day;
  return <footer className="system-footer no-print px-4 md:px-6 py-4 text-sm"><div className="flex flex-col md:flex-row md:items-center md:justify-between gap-2"><div className="font-bold" style={{ color: 'var(--theme-footer-accent)' }}>{data.churchSettings.church_name}</div><div className="opacity-80">{[data.churchSettings.address, data.churchSettings.contact, data.churchSettings.location].filter(Boolean).join(' | ')}</div><div className="opacity-90 max-w-xl">{verse}</div></div></footer>;
}
function App() {
  return <DataProvider><AppShell /></DataProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
